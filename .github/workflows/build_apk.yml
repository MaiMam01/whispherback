name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/build_apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      # Client-facing: optimized release, one APK per CPU type (~25–40 MB each).
      # arm64-v8a covers almost all phones from the last ~8 years.
      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi --dart-define=FLAVOR=dev

      - name: Upload client APK (arm64 — give this to most clients)
        uses: actions/upload-artifact@v4
        with:
          name: whisperback-release-arm64
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 90

      - name: Upload all release APKs (arm32 + x86 emulators)
        uses: actions/upload-artifact@v4
        with:
          name: whisperback-release-all-abis
          path: mobile/build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30
