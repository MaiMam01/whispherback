name: whisperback
description: WhisperBack - Your Personalized Audio Whisperer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  audio_session: ^0.1.21
  adhan: ^2.0.0+1
  geolocator: ^13.0.2
  file_picker: ^8.1.6
  record: ^5.2.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  # Round 21: `android_alarm_manager_plus` was REMOVED. Its
  # background-isolate model could not produce audio reliably on
  # Android 14+ (mediaPlayback FG service required for audio focus
  # when the screen is off) and its periodic alarms are INEXACT
  # (Doze-throttled). We now drive scheduled playback through a
  # native Kotlin path: `WhisperAlarmScheduler` registers exact
  # `setAlarmClock` alarms; `WhisperAlarmReceiver` starts a typed
  # `WhisperPlaybackService` (foregroundServiceType="mediaPlayback")
  # which plays the clip via MediaPlayer. This is the alarm-clock
  # model — the only architecture that satisfies "audio plays at
  # the right time even when the app is closed on aggressive OEMs".
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  equatable: ^2.0.7
  collection: ^1.19.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_lucide: ^1.11.0
  sqflite_common_ffi: ^2.3.4
  # Round 23 — pin `sqlite3` explicitly to 3.3.3+. Version 3.3.2's
  # build hook pinned a sha256 for `libsqlite3.x64.linux.so` that no
  # longer matched the binary served from the GitHub release (upstream
  # bug — the file was re-uploaded but the pinned hash was not
  # updated). This reproduced on every GitHub Actions Linux runner as:
  #   "Bad state: Hash of downloaded file libsqlite3.x64.linux.so is
  #    de78a2a1… , expected 9b1c8c24…"
  # 3.3.3+ ships fresh, matching hashes; `^3.3.3` currently resolves to
  # 3.3.4 which is what CI now uses. We keep it as a top-level dep
  # (was transitive via sqflite_common_ffi) so we control the version
  # explicitly and CI never regresses back to 3.3.2 automatically.
  sqlite3: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  fake_async: ^1.3.1

dependency_overrides:
  # record 5.x pulls record_linux 0.7.x which breaks Windows/desktop builds
  record_linux: ^1.2.2

# Round 23 — belt-and-suspenders defence against upstream `sqlite3`
# hash-mismatch bugs (see the `sqlite3: ^3.3.3` note above). Telling
# the sqlite3 build hook to `source: system` skips the binary download
# entirely and uses the OS-provided libsqlite3 instead. This ONLY
# affects host builds (CI test runs, Windows/Linux/macOS desktop) —
# on Android and iOS the sqflite plugin bundles its own SQLite via
# the platform channel and this hook config is a no-op.
#
# GitHub Actions `ubuntu-latest` runners ship with libsqlite3 in
# /usr/lib, so `dlopen("libsqlite3.so")` resolves without a package
# install. Local Windows/macOS developer machines fall back to the
# bundled binary if the system lookup fails (which for us it won't,
# since tests run on Linux CI and Windows dev boxes have SQLite via
# `sqflite_common_ffi`'s own bundled fallback).
hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/audio/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/app_logo.png"
  adaptive_icon_background: "#020611"
  adaptive_icon_foreground: "assets/branding/app_logo.png"
  min_sdk_android: 24
  remove_alpha_ios: true
